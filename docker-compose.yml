x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_DB: ${DB_NAME:-biozone}
      POSTGRES_USER: ${DB_USER:-biozone}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-biozone}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ملحوظة: خدمة Redis مش مستخدمة فعليًا في الكود حاليًا (مفيش CACHES ولا
  # SESSION_ENGINE بيشير لها) — لو مش ناوي تفعّلها قريب (كاش مثلاً)، تقدر
  # تشيلها خالص من هنا توفّر رام إضافية على الـ VPS.
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    logging: *default-logging

  web:
    build: .
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - .env.production
    environment:
      DB_HOST: db
      DB_PORT: 5432
      # لو GUNICORN_WORKERS متحدد في .env.production بيتاخد زي ما هو (تحكم
      # يدوي). لو المشروع صغير (عدد عملاء وموظفين محدود) بننصح تحدده يدويًا
      # (GUNICORN_WORKERS=3 مثلًا) بدل الاعتماد على حساب (2×الأنوية)+1
      # التلقائي، لأنه ممكن يشغّل عدد workers أكبر من اللي رام السيرفر
      # تقدر تستحمله لو السيرفر عنده أنوية كتير ورام محدودة.
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      web:
        condition: service_healthy

volumes:
  postgres_data:
  static_volume:
  media_volume:
