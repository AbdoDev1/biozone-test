{% if quantity > 0 %}

<div class="flex items-center gap-2 mt-3">

    <button
        hx-post="{% url 'orders:cart_minus' unit_id %}"
        hx-target="closest div"
        hx-swap="outerHTML"
        class="w-8 h-8 rounded-lg bg-gray-200 hover:bg-gray-300">
        −
    </button>

    <span class="font-bold w-8 text-center">
        {{ quantity }}
    </span>

    <button
        hx-post="{% url 'orders:cart_plus' unit_id %}"
        hx-target="closest div"
        hx-swap="outerHTML"
        class="w-8 h-8 rounded-lg bg-blue-600 text-white hover:bg-blue-700">
        +
    </button>

</div>

{% else %}

<form
    hx-post="{% url 'orders:cart_add' unit_id %}"
    hx-target="this"
    hx-swap="outerHTML">

    {% csrf_token %}

    <button
        type="submit"
        class="mt-2 w-full bg-blue-600 hover:bg-blue-700 text-white text-xs py-2 rounded-lg transition inline-flex items-center justify-center gap-1.5">
        <svg class="w-3.5 h-3.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 00-3 3h15.75m-12.75-3h11.218c1.121-2.3 1.994-4.457 2.781-6.987a1.125 1.125 0 00-1.087-1.437H5.106M7.5 14.25L5.106 5.272M6 20.25a.75.75 0 11-1.5 0 .75.75 0 011.5 0zm12.75 0a.75.75 0 11-1.5 0 .75.75 0 011.5 0z"/></svg>
        أضف إلى السلة
    </button>

</form>

{% endif %}
