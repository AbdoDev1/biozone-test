{% if messages %}
<div class="max-w-4xl mx-auto px-4 pt-4 space-y-2">
  {% for message in messages %}
  <div class="rounded-xl px-4 py-3 text-sm
    {% if message.tags == 'success' %}bg-green-50 text-green-700 border border-green-200
    {% elif message.tags == 'error' %}bg-red-50 text-red-700 border border-red-200
    {% elif message.tags == 'warning' %}bg-amber-50 text-amber-700 border border-amber-200
    {% else %}bg-blue-50 text-blue-700 border border-blue-200{% endif %}">
    {{ message }}
  </div>
  {% endfor %}
</div>
{% endif %}
