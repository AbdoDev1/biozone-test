{% extends 'base.html' %}

{% block title %}في انتظار الموافقة — Biozone{% endblock %}

{% block content %}
<div class="min-h-[calc(100vh-4rem)] flex items-center justify-center">
    <div class="bg-white rounded-2xl shadow-lg p-10 w-full max-w-md text-center">
        <div class="flex justify-center mb-6">
            <svg class="w-16 h-16 text-orange-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        </div>
        <h2 class="text-2xl font-bold text-gray-800 mb-2">طلبك قيد المراجعة</h2>
        <p class="text-gray-500 mb-6">
            تم استلام طلب تسجيلك بنجاح.<br>
            سيتم مراجعته من قبل الإدارة وإخطارك قريباً.
        </p>
        <a href="{% url 'accounts:login' %}"
           class="inline-block bg-blue-600 hover:bg-blue-700 text-white font-semibold px-6 py-2 rounded-lg transition">
            العودة لتسجيل الدخول
        </a>
    </div>
</div>
{% endblock %}
