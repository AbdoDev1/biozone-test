<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل دخول الموظفين — Biozone</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-blue-700">Biozone ERP</h1>
            <p class="text-gray-500 mt-1">نظام إدارة الموظفين</p>
        </div>
        {% if messages %}
        {% for message in messages %}
        <div class="bg-red-100 text-red-700 px-4 py-2 rounded-lg mb-4 text-sm">{{ message }}</div>
        {% endfor %}
        {% endif %}
        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">اسم المستخدم</label>
                <input type="text" name="username"
                       class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">كلمة المرور</label>
                <input type="password" name="password"
                       class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <button type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-lg transition">
                تسجيل الدخول
            </button>
        </form>
        <p class="text-center text-xs text-gray-400 mt-6">
            هل أنت عميل؟ <a href="{% url 'accounts:login' %}" class="text-blue-600 hover:underline">سجّل الدخول من هنا</a>
        </p>
    </div>
</body>
</html>
