server {
    listen 80;
    # "_" = catch-all: nginx بيستقبل الطلب لأي دومين/Host وصله (localhost،
    # IP السيرفر، دومين حقيقي، أو Cloudflare tunnel) من غير ما نضطر نعدّل
    # الملف ده تاني لما الدومين يتحدد. الحماية الفعلية من دومينات غريبة
    # موجودة أصلًا في Django (ALLOWED_HOSTS في settings.py).
    server_name _;

    client_max_body_size 20M;

    location /static/ {
        alias /app/staticfiles/;
    }

    location /media/ {
        alias /app/media/;
    }

    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
